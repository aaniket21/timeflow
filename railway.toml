[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.prod"

[deploy]
startCommand = "php artisan octane:start --server=swoole --host=0.0.0.0 --port=$PORT --workers=auto --task-workers=auto"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
