<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Offline - TimeFlow</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A0A0F;
      color: #FFFFFF;
      font-family: 'Plus Jakarta Sans', sans-serif;
      text-align: center;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin: 0 0 10px;
    }
    p {
      font-size: 15px;
      color: #A1A1AA;
      max-width: 300px;
      margin: 0 0 30px;
      line-height: 1.5;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      padding: 0 24px;
      border-radius: 12px;
      background: #7C5CFC;
      color: #FFFFFF;
      font-weight: 600;
      font-size: 15px;
      text-decoration: none;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You are offline</h1>
  <p>Please check your internet connection. We will sync your timer and habits when you are back online.</p>
  <button class="btn" onclick="window.location.reload()">Retry</button>
</body>
</html>
